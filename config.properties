# S3/MinIO File Manager Configuration
# Place this file in the same directory as the executable

# Endpoint URL (use https:// for SSL, http:// for non-SSL)
endpoint=https://localhost:9000

# Authentication credentials
accessKey=minioadmin
secretKey=minioadmin

# AWS region (default: us-east-1)
region=us-east-1

# Target bucket name
bucketName=test-bucket

# Optional: Client certificate for mTLS (mutual TLS)
# p12Path=client-cert.p12
# p12Password=changeit

# SSL/TLS configuration
useSSL=true
pathStyleAccess=true

# DEV ONLY: Disable certificate validation (INSECURE - DO NOT USE IN PRODUCTION)
# disableCertificateValidation=false

# Connection timeout in seconds
connectionTimeoutSeconds=60